<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smartineer — Wissen Reloaded</title>
    <meta name="description" content="Interaktives Aufgaben- und Cheatsheet-Repository zur Reaktivierung von Ingenieurswissen: Mathematik, Regelungstechnik, Robotik, Systemtheorie, Physik, Kryptographie, Blockchain, Neuronale Netze. PWA-fähig — auch offline auf Mobilgeräten installierbar.">

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smartineer">
    <!-- Brand-Logo (PNG) als primaeres Touch-/Tab-Icon, SVG als Fallback fuer Maskable. -->
    <link rel="apple-touch-icon" href="icons/smartineer-logo.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/smartineer-logo.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icons/smartineer-logo.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/smartineer-logo.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/smartineer-logo.png">
    <link rel="icon" type="image/png" href="icons/smartineer-logo.png">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <!-- Windows-Tile (gepinnte Kachel im Startmenue/Taskleiste). -->
    <meta name="msapplication-TileColor" content="#1e3a8a">
    <meta name="msapplication-TileImage" content="icons/smartineer-logo.png">

    <!-- Open Graph / Twitter — Brand-Logo als Share-Vorschau. -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Smartineer — Wissen Reloaded">
    <meta property="og:description" content="Interaktives Aufgaben- und Cheatsheet-Repository zur Reaktivierung von Ingenieurswissen — installierbar als PWA.">
    <meta property="og:image" content="icons/smartineer-logo.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Smartineer — Wissen Reloaded">
    <meta name="twitter:description" content="Interaktives Aufgaben- und Cheatsheet-Repository zur Reaktivierung von Ingenieurswissen — installierbar als PWA.">
    <meta name="twitter:image" content="icons/smartineer-logo.png">

    <!-- Tailwind, Chart.js, KaTeX -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">

    <!-- Pre-Paint Theme: setzt theme-Klasse vor Render, vermeidet Flicker. Default = light. -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('smartineer_theme_v1') || 'light';
                document.documentElement.classList.add('theme-' + t);
            } catch (e) {
                document.documentElement.classList.add('theme-light');
            }
        })();
    </script>
</head>
<body class="min-h-screen flex flex-col">

    <!-- React-Mount-Punkt -->
    <div id="react-root"></div>

    <!-- Fallback, falls JS deaktiviert -->
    <noscript>
        <div style="padding:2rem;max-width:680px;margin:2rem auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;font-family:system-ui">
            <h1 style="font-weight:bold;color:#0f172a">Smartineer benötigt JavaScript</h1>
            <p style="color:#475569">Diese Anwendung läuft als statische SPA bzw. Progressive Web App vollständig im Browser.
            Bitte aktiviere JavaScript, um Aufgaben und Cheatsheets zu nutzen.</p>
        </div>
    </noscript>

    <!-- Auth-Konfiguration: Frontend-only Convenience, KEIN Schutz. -->
    <!-- Datei ist gitignored; bei fehlender Datei laedt eine optionale Vorlage als Fallback. -->
    <script src="js/auth-credentials.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='js/auth-credentials.example.js';document.head.appendChild(s);"></script>

    <!-- Daten-Module: registrieren window.APP_DATA / window.APP_ORDER -->
    <script src="js/data/math.js"></script>
    <script src="js/data/control.js"></script>
    <script src="js/data/digital_control.js"></script>
    <script src="js/data/robotics.js"></script>
    <script src="js/data/system_theory.js"></script>
    <script src="js/data/physics.js"></script>
    <script src="js/data/crypto.js"></script>
    <script src="js/data/blockchain.js"></script>
    <script src="js/data/neural_nets.js"></script>
    <script src="js/data/plc.js"></script>
    <script src="js/data/cyber_security.js"></script>
    <script src="js/data/krl.js"></script>
    <script src="js/data/fuegetechniken.js"></script>
    <script src="js/data/agentic_ai.js"></script>
    <script src="js/data/sensorik.js"></script>
    <script src="js/data/ai_models.js"></script>
    <script src="js/data/schueler.js"></script>
    <script src="js/data/schulung_securityx.js"></script>
    <script src="js/data/schulung_starter.js"></script>
    <script src="js/data/schulung_allgemeinmedizin.js"></script>
    <script src="js/data/schulung_master_et_cybersec.js"></script>
    <script src="js/data/schulung_master_et_automation.js"></script>

    <!-- React + ReactDOM (UMD via CDN) und Babel-standalone (JSX-Transform im Browser) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App-Logik (JSX wird zur Laufzeit transpiliert — kein Build-Schritt nötig) -->
    <script type="text/babel" data-presets="react" src="js/app.jsx"></script>

    <!-- Service-Worker-Registrierung (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js').catch(function (err) {
                    console.warn('[Smartineer] SW-Registrierung fehlgeschlagen:', err);
                });
            });
        }
    </script>
</body>
</html>
