<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Smartineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <!-- Ein Zahn als Symbol, 12-fach rotiert -->
    <symbol id="tooth" overflow="visible">
      <rect x="-22" y="-188" width="44" height="40" rx="8" fill="url(#gear)" stroke="#b45309" stroke-width="3"/>
    </symbol>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Code-Syntax-Klammern <  /> in den Ecken -->
  <g fill="none" stroke="#bae6fd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <polyline points="96,84 64,116 96,148"/>
    <polyline points="416,364 448,396 416,428"/>
    <line x1="404" y1="364" x2="376" y2="428"/>
  </g>

  <g transform="translate(256 256)">
    <!-- 12 Zähne im Kreis -->
    <g>
      <use href="#tooth" transform="rotate(0)"/>
      <use href="#tooth" transform="rotate(30)"/>
      <use href="#tooth" transform="rotate(60)"/>
      <use href="#tooth" transform="rotate(90)"/>
      <use href="#tooth" transform="rotate(120)"/>
      <use href="#tooth" transform="rotate(150)"/>
      <use href="#tooth" transform="rotate(180)"/>
      <use href="#tooth" transform="rotate(210)"/>
      <use href="#tooth" transform="rotate(240)"/>
      <use href="#tooth" transform="rotate(270)"/>
      <use href="#tooth" transform="rotate(300)"/>
      <use href="#tooth" transform="rotate(330)"/>
    </g>

    <!-- Zahnrad-Korpus (gelber Ring) -->
    <circle r="160" fill="url(#gear)" stroke="#b45309" stroke-width="3"/>
    <!-- Dunkler Innenkreis -->
    <circle r="128" fill="#0f172a"/>
    <circle r="128" fill="none" stroke="url(#ring)" stroke-width="6"/>

    <!-- Geschweifte Code-Klammern { } -->
    <g fill="none" stroke="#bae6fd" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
      <path d="M -98,-66 C -112,-66 -114,-54 -114,-32 C -114,-12 -120,0 -128,0 C -120,0 -114,12 -114,32 C -114,54 -112,66 -98,66"/>
      <path d="M  98,-66 C  112,-66  114,-54  114,-32 C  114,-12  120,0  128,0 C  120,0  114,12  114,32 C  114,54  112,66  98,66"/>
    </g>

    <!-- Sigma als Hauptmotiv -->
    <text x="0" y="34"
          font-family="'Cambria Math','Latin Modern Math','Times New Roman',Georgia,serif"
          font-weight="700" font-size="170"
          text-anchor="middle"
          fill="url(#ring)">&#x03A3;</text>

    <!-- Lambda links oben -->
    <text x="-66" y="-46"
          font-family="'Cambria Math','Latin Modern Math','Times New Roman',Georgia,serif"
          font-weight="700" font-style="italic" font-size="40"
          text-anchor="middle"
          fill="#fef3c7" opacity="0.85">&#x03BB;</text>

    <!-- Omega rechts unten -->
    <text x="66" y="92"
          font-family="'Cambria Math','Latin Modern Math','Times New Roman',Georgia,serif"
          font-weight="700" font-size="40"
          text-anchor="middle"
          fill="#fef3c7" opacity="0.85">&#x03A9;</text>
  </g>
</svg>
